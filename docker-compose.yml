version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=${POSTGRES_DSN}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      jaeger: { condition: service_healthy }
    # restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orders
    ports: ["5432:5432"]
    volumes:
      - gin-postgres-db_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - gin-redis-server_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - gin-broker_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 3s
      retries: 5

  # prometheus:
  #   image: prom/prometheus:v2.42.0
  #   ports:
  #     - "9090:9090"
  #   # Change 127.0.0.1 to ip address of node where docker satck is deployed     
  #   command: 
  #     - "--config.file=/etc/prometheus/prometheus.yml"
  #     - "--storage.tsdb.path=/prometheus" 
  #     - "--web.external-url=http://127.0.0.1:9090"
  #     - "--web.console.libraries=/usr/share/prometheus/console_libraries" 
  #     - "--web.console.templates=/usr/share/prometheus/consoles"
  #   volumes:
  #     - local-prom-data:/prometheus
  #     - ./configs/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
  #     - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  gin-postgres-db_data:
  gin-redis-server_data:
  gin-broker_data:

networks:
  servise_network:
    driver: bridge
    name: servise_network